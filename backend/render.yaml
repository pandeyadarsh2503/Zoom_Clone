# Render Blueprint — one-click deploy of the API + a managed Postgres database.
# In the Render dashboard: New → Blueprint → point at this repo.
services:
  - type: web
    name: zoom-clone-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true          # Render generates a strong secret
      - key: DATABASE_URL
        fromDatabase:
          name: zoom-clone-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false                  # set to your Vercel URL after deploy
      - key: ALLOWED_ORIGINS
        sync: false                  # set to your Vercel URL after deploy

databases:
  - name: zoom-clone-db
    plan: free
